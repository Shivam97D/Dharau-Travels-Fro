# Netlify configuration for the Dharavu Journeys frontend (Vite SPA).
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes (e.g. /trips/:slug, /admin) resolve.
# Note: public/_redirects also proxies /api/* to the Render backend.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
