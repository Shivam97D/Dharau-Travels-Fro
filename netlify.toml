# Netlify configuration for the Dharavu Journeys frontend (Vite SPA).
[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to Render backend — must come before the SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "https://dharau-travels.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback so client-side routes (e.g. /trips/:slug, /admin) resolve.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
